name: app-build-action
# 推送 Tag 时触发
on:
  push:
    tags:
      - "v*"

jobs:
  build-ios-unsigned:
    # 构建 IPA 必须使用 macOS 环境
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 2. 设置 Flutter 环境
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 3. 更新 Flutter 依赖
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 4. 构建 iOS 产物 (不签名)
      - name: Build iOS Frameworks
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 5. 封装为未签名 IPA
      # 模拟导出过程：创建 Payload 文件夹并压缩
      - name: Create Unsigned IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # 6. 获取版本信息
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 7. 上传 IPA 至 GitHub Release
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          # 如果标签包含 beta 或 alpha，则标记为预发布
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 完成提示
      - run: echo "🍏 iOS Unsigned IPA build status is ${{ job.status }}."
