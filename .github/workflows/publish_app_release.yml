name: app-build-action
# 推送 Tag 时触发
on:
  push:
    tags:
      - "v*"

jobs:
  build-mobile:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 2. 设置 JAVA 环境 (构建 Android 所需)
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 3. 设置 Flutter 环境
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 4. 更新 Packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 5. 构建未签名 APK 
      # 不配置 key.properties，Flutter 默认生成未签名（或仅包含调试签名）的 Release APK
      - name: Build Unsigned APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      # 6. 构建未签名 iOS 产物 (Frameworks)
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 7. 封装未签名 IPA
      - name: Create Unsigned IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # 8. 获取版本信息
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 9. 上传至 Release
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 完成提示
      - run: echo "🍏 Mobile build job status is ${{ job.status }}."
